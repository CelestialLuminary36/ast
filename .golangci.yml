linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - prealloc
  disable-all: false

linters-settings:
  goimports:
    local-prefixes: github.com/hhy/ast
  misspell:
    locale: US

issues:
  exclude-dirs:
    - _smoke
